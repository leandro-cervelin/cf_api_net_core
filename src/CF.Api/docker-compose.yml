version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: CF.Api/Dockerfile
    ports:
      - "8888:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DbConnection=Data Source=db;Initial Catalog=CF;User ID=sa;Password=${SA_PASSWORD};Trusted_Connection=False;TrustServerCertificate=True;
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
